name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint → Typecheck → Test → Coverage gate ────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Lint (ESLint + jsx-a11y)
        run: npm run lint

      - name: Type-check
        run: npx tsc -b --noEmit

      - name: Tests with coverage
        run: npm run test:coverage

      - name: Enforce 70% coverage gate
        run: |
          node -e "
            const s = require('./coverage/coverage-summary.json').total;
            const pct = s.lines.pct;
            console.log('Coverage: ' + pct + '% (target: 70%)');
            if (pct < 70) { console.error('::error::Coverage ' + pct + '% is below 70%'); process.exit(1); }
          "

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ── Firestore rules against real emulator (PRs only) ──────────────────
  firestore-rules:
    name: Firestore Rules
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - run: npm install -g firebase-tools
      - run: firebase emulators:exec --only firestore --project test-project "npm run test:rules"

  # ── Playwright E2E smoke (PRs only, after frontend passes) ─────────────
  e2e:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs: [frontend]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: E2E smoke tests
        run: npx playwright test tests/e2e/smoke.spec.ts --project=chromium
        env:
          VITE_FIREBASE_API_KEY: ci-dummy
          VITE_FIREBASE_AUTH_DOMAIN: ci.example.com
          VITE_FIREBASE_PROJECT_ID: ci-dummy
          VITE_FIREBASE_STORAGE_BUCKET: ci-dummy.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '0'
          VITE_FIREBASE_APP_ID: '0:0:web:0'
          VITE_GA_MEASUREMENT_ID: G-DUMMY
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
